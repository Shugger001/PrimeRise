name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify 404.html matches global html config
        run: |
          set -euo pipefail
          grep -q 'data-form-endpoint=""' 404.html || { echo "404.html: missing data-form-endpoint on html"; exit 1; }
          grep -q 'data-ga-id=""' 404.html || { echo "404.html: missing data-ga-id on html"; exit 1; }
          grep -q 'class="footer__note"' 404.html || { echo "404.html: missing footer email note"; exit 1; }
          grep -q 'id="cookieBanner"' 404.html || { echo "404.html: missing cookie banner"; exit 1; }
          grep -q 'main.js' 404.html || { echo "404.html: missing main.js"; exit 1; }

      - name: Verify core files exist
        run: |
          set -euo pipefail
          for f in \
            index.html \
            products.html \
            faq.html \
            privacy.html \
            terms.html \
            404.html \
            main.js \
            styles.css \
            netlify.toml \
            vercel.json \
            robots.txt \
            sitemap.xml \
            manifest.webmanifest \
            _redirects
          do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done

      - name: Validate vercel.json
        run: python3 -c "import json; json.load(open('vercel.json'))"

      - name: Verify referenced images exist
        run: |
          set -euo pipefail
          for img in \
            images/hero-premium-identity.png \
            images/golden-restore-ingredients.jpeg \
            images/hero-three-bottles.jpeg \
            images/maringa-mint-hero.jpeg \
            images/maringa-mint-bottles.jpeg
          do
            test -f "$img" || { echo "Missing: $img"; exit 1; }
          done

      - name: Verify shared UI in main pages
        run: |
          set -euo pipefail
          for f in index.html products.html faq.html privacy.html terms.html; do
            grep -q 'id="backToTop"' "$f" || { echo "Missing back-to-top control in $f"; exit 1; }
            grep -q 'rel="manifest"' "$f" || { echo "Missing web manifest link in $f"; exit 1; }
          done

      - name: Validate manifest.webmanifest
        run: python3 -c "import json; json.load(open('manifest.webmanifest'))"

      - name: Verify cookie banner accessibility ids
        run: |
          set -euo pipefail
          for f in index.html products.html faq.html privacy.html terms.html 404.html; do
            grep -q 'id="cookieBannerTitle"' "$f" || { echo "Missing cookieBannerTitle in $f"; exit 1; }
            grep -q 'aria-describedby="cookieBannerDesc"' "$f" || { echo "Missing cookie aria-describedby in $f"; exit 1; }
          done
